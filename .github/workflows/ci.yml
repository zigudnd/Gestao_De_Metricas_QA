name: CI

on:
  push:
    branches: [main, dash-*]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Typecheck + Tests + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit --excludeDirectories node_modules --skipLibCheck

      - name: Unit tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build
